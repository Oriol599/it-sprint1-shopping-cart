name: CI/CD Deploy to GitHub Pages

on:
  push:
    branches:
      - main # O el nombre de tu rama principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Instalar Node.js
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-node: 20
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: npm ci

      # 4. Ejecutar tests
      - name: Ejecutar tests
        run: npm run test

      # 5. Construir el proyecto
      - name: Construir aplicación
        run: npm run build

      # 6. Desplegar en gh-pages automáticamente
      - name: Desplegar a GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Carpeta que contiene el build de Vite
          branch: gh-pages # La acción creará esta rama sola si no existe
          token: ${{ secrets.GH_TOKEN }}
